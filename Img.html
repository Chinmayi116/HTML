<!DOCTYPE html>
<html>
<head>
    <title>Image Tag Example</title>
</head>
<body>

    <h1>My Image Example</h1>

    <!-- Simple Image -->
    <img src="https://via.placeholder.com/200" alt="Sample Image">

    <br><br>

    <!-- Image with size -->
    <img src="https://via.placeholder.com/300x200" 
         alt="Sized Image" 
         width="300" height="200">

    <br><br>

    <!-- Clickable Image -->
    <a href="https://www.google.com" target="_blank">
        <img src="https://via.placeholder.com/150" alt="Click Me">
    </a>

</body>
</html>
