<!DOCTYPE html>
<html>
<head>
    <title>Class Selector</title>

    <style>
        .heading {
            color: blue;
            font-size: 30px;
        }

        .para {
            color: green;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1 class="heading">Welcome to CSS</h1>

    <p class="para">
        This is an example of class selector.
    </p>

</body>
</html>
